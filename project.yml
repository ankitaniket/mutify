name: Mutify
options:
  bundleIdPrefix: com.ankitaniket
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

targets:
  Mutify:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: mutify
        excludes:
          - "Info.plist"
    info:
      path: mutify/Info.plist
      properties:
        CFBundleName: Mutify
        CFBundleDisplayName: Mutify
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSMicrophoneUsageDescription: "Mutify reads and toggles the system input device mute state so you can mute your microphone from anywhere with a global shortcut."
        NSHumanReadableCopyright: "Copyright © 2026 Ankit Aniket. All rights reserved."
        SUFeedURL: "https://raw.githubusercontent.com/ankitaniket/mutify/main/appcast.xml"
        SUEnableInstallerLauncherService: true
        SUEnableAutomaticChecks: false
        SUPublicEDKey: "pzT1bVcL3DjayLr8QhS+3fA10zLgxkRPJvDLm1g+nXw="
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ankitaniket.mutify
        PRODUCT_NAME: Mutify
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: mutify/Mutify.entitlements
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
